[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Default invocation excludes live tests so `pytest tests/` is fast and offline.
# The live tier (HTTP API e2e + any future live-Finviz check) is opt-in via
# `pytest -m live`. Spec §6.3 mandates the live-Finviz gate as a pre-PR check
# for fincli_api/ and fincli/stock_screening/ — that gate runs `-m live`.
addopts = -q -ra -m "not live"
norecursedirs = .git .venv venv env node_modules dist build __pycache__ .cache .pytest_cache
markers =
    live: marks tests as requiring live Finviz HTTP (deselect with -m 'not live')
